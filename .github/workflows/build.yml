name: build

on:
  workflow_dispatch:
    inputs:
      commitHash:
        description: 'webrtc-sdk commit hash'
        default: ''
        required: true
      configuration:
        description: 'build configuration'
        default: 'release'
        required: true
        type: choice
        options:
          - release
          - debug
  push:
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'NOTICE'
      - '.gitignore'
      - '.dockerignore'
    branches-ignore:
      - daily
    tags:
      - '*'

permissions:
  packages: write
  contents: write
  actions: read

jobs:
  build-apple:
    defaults:
      run:
        working-directory: ./build
    strategy:
      fail-fast: false
      matrix:
        name:
          - apple
    runs-on: macos-26
    steps:
    - uses: actions/checkout@v5
    - name: Select Xcode 26.0
      run: sudo xcode-select --switch /Applications/Xcode_26.0.app/Contents/Developer
    - name: Build
      id: build
      run: ./build.${{ matrix.name }}.sh "${{ github.event.inputs.commitHash }}" "${{ github.event.inputs.configuration || 'release' }}"
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.build.outputs.framework_name }}.xcframework.zip
        path: build/_package/${{ matrix.name }}/${{ steps.build.outputs.framework_name }}.xcframework.zip
  build-linux:
    defaults:
      run:
        working-directory: ./build
    strategy:
      fail-fast: false
      matrix:
        name:
          - android
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - run: ./build.${{ matrix.name }}.sh "${{ github.event.inputs.commitHash }}"
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: webrtc.${{ matrix.name }}.tar.gz
        path: build/_package/${{ matrix.name }}/webrtc.tar.gz
  create-release:
    name: Create Release
    if: github.ref_type == 'tag'
    needs:
      - build-apple
      - build-linux
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/download-artifact@v4
      with:
        path: artifacts
        name: webrtc.android.tar.gz
    - uses: actions/download-artifact@v4
      with:
        path: artifacts
        name: WebRTC.xcframework.zip
    - uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        files: artifacts/**
  publish-maven:
    name: Publish Android AAR to maven-repo branch
    if: github.ref_type == 'tag'
    needs:
      - build-linux
    runs-on: ubuntu-latest
    env:
      GROUP_ID: io.github.vizoss
      ARTIFACT_ID: webrtc-android
      VERSION: ${{ github.ref_name }}
    steps:
    - uses: actions/download-artifact@v4
      with:
        path: artifacts
        name: webrtc.android.tar.gz
    - name: Extract AAR
      run: |
        mkdir -p extracted
        tar -xzf artifacts/webrtc.tar.gz -C extracted
    - name: Publish to maven-repo branch
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail
        REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
        git clone "$REPO_URL" maven-checkout
        cd maven-checkout
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        if git ls-remote --exit-code --heads origin maven-repo >/dev/null 2>&1; then
          git checkout maven-repo
        else
          git checkout --orphan maven-repo
          git rm -rf . >/dev/null 2>&1 || true
        fi
        GROUP_PATH=$(echo "$GROUP_ID" | tr '.' '/')
        DEST_DIR="$GROUP_PATH/$ARTIFACT_ID/$VERSION"
        mkdir -p "$DEST_DIR"
        cp ../extracted/webrtc/aar/libwebrtc.aar "$DEST_DIR/$ARTIFACT_ID-$VERSION.aar"
        cat > "$DEST_DIR/$ARTIFACT_ID-$VERSION.pom" <<POM
        <?xml version="1.0" encoding="UTF-8"?>
        <project xmlns="http://maven.apache.org/POM/4.0.0">
          <modelVersion>4.0.0</modelVersion>
          <groupId>${GROUP_ID}</groupId>
          <artifactId>${ARTIFACT_ID}</artifactId>
          <version>${VERSION}</version>
          <packaging>aar</packaging>
        </project>
        POM
        git add "$DEST_DIR"
        git commit -m "Publish ${ARTIFACT_ID}:${VERSION}"
        git push origin maven-repo
